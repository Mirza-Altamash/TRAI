services:
  mongodb:
    image: mongo:6.0
    container_name: trai-mongodb
    restart: unless-stopped
    volumes:
      - trai_mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trai-backend-api
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/trai_citizen_hub
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    depends_on:
      - mongodb
    volumes:
      - trai_uploaded_attachments:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trai-frontend-app
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - VITE_API_URL=http://192.168.7.251:5002/api
      - VITE_SOCKET_URL=http://192.168.7.251:5002
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: trai-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  trai_mongo_data:
  trai_uploaded_attachments:
